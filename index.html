<meta charset="utf-8">
<title>잊힘의 안개 — 텍스트 원정</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<style>
  :root {
    --bg: #D9D0BE;
    --panel: #E6DECC;
    --panel-dark: #C9BFA8;
    --ink: #3A3128;
    --ink-soft: #6B5F4E;
    --ornament: #A08A5F;
    --frame: #57493A;
    --red: #B03A48;
    --blue: #4E7FA8;
    --purple: #8A5FA0;
    --gold: #C08A2E;
    --green: #5F8F4E;
    --ember: #7E6BAF;
    --bar-fill: #7FA36B;
    --surround: #2A2620;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { height: 100%; }
  body {
    min-height: 100%; /* height 고정 시 flex stretch가 컨테이너 높이를 화면에 잠가 내용이 잘림 */
    background: var(--surround);
    font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
    color: var(--ink);
    display: flex;
    justify-content: center;
    align-items: flex-start;
  }
  #game {
    width: 100%;
    max-width: 540px;
    min-height: 100dvh;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    padding: 16px 16px 12px;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  /* ---------- 헤더 ---------- */
  header { display: grid; grid-template-columns: 118px 1fr; gap: 10px; }
  #portrait {
    width: 118px; height: 118px;
    background: #6B7D94;
    border: 4px solid var(--frame);
    display: flex; align-items: center; justify-content: center;
    color: #EBE7DC; font-size: 52px; font-weight: bold;
  }
  .head-right { display: flex; flex-direction: column; gap: 7px; min-width: 0; }
  .head-top { display: flex; gap: 7px; align-items: stretch; }
  #nameplate {
    flex: 1;
    background: var(--panel);
    border: 2px solid var(--frame);
    text-align: center;
    font-size: 17px; font-weight: bold;
    padding: 7px 4px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .icon-btn {
    width: 38px;
    background: var(--panel);
    border: 2px solid var(--frame);
    font-size: 11px; color: var(--ink);
    cursor: pointer;
    font-family: inherit;
  }
  .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
  .stat-cell {
    background: var(--panel);
    border: 1px solid var(--panel-dark);
    display: flex; justify-content: space-between; align-items: center;
    padding: 4px 8px;
    font-size: 14px;
  }
  .stat-cell b { font-variant-numeric: tabular-nums; font-size: 16px; }
  .bar-row { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
  .bar-label { font-size: 13px; font-weight: bold; width: 30px; }
  .rbar { flex: 1; height: 14px; background: var(--panel-dark); border: 1px solid var(--frame); }
  .rbar-fill { height: 100%; width: 100%; transition: width .4s; }
  .bar-num { font-size: 13px; font-variant-numeric: tabular-nums; min-width: 48px; text-align: right; }

  /* ---------- 진행 바 ---------- */
  #progress-wrap { display: flex; align-items: center; gap: 6px; margin-top: 12px; }
  #progress {
    flex: 1; height: 16px;
    background: var(--panel-dark);
    border: 2px solid var(--frame);
  }
  #progress-fill { height: 100%; width: 0%; background: var(--bar-fill); transition: width .6s ease; }
  #progress-cap { width: 22px; height: 22px; background: var(--ornament); }

  /* ---------- 노드 삽화 ---------- */
  #illust { display: none; margin-top: 12px; border: 2px solid var(--frame); background: var(--panel-dark); }
  #illust img { width: 100%; display: block; aspect-ratio: 16 / 9; object-fit: cover; }

  /* ---------- 본문 ---------- */
  .ornament-rule {
    display: flex; align-items: center; gap: 14px;
    margin: 16px 8px 0;
  }
  .ornament-rule::before, .ornament-rule::after {
    content: ''; flex: 1; height: 2px; background: var(--ornament);
  }
  .diamond { width: 14px; height: 14px; background: var(--ornament); transform: rotate(45deg); }

  #roll {
    text-align: center; font-size: 14px; font-weight: bold;
    min-height: 22px; margin-top: 8px;
  }
  #roll.ok { color: var(--green); }
  #roll.bad { color: var(--red); }

  #story {
    font-family: 'Nanum Myeongjo', 'Batang', 'AppleMyungjo', serif;
    font-size: 17px; line-height: 1.75;
    padding: 6px 10px 0;
    min-height: 200px;
    white-space: pre-wrap;
    cursor: pointer;
  }

  .dist-rule {
    display: flex; align-items: center; gap: 16px;
    margin: 14px 16px 6px;
    color: var(--ink-soft); font-size: 15px;
    font-variant-numeric: tabular-nums;
  }
  .dist-rule::before, .dist-rule::after {
    content: ''; flex: 1; height: 1px; background: var(--ink-soft);
  }

  /* ---------- 선택지 ---------- */
  #choices { display: flex; flex-direction: column; gap: 10px; padding: 6px 4px; }
  #choices.hidden { visibility: hidden; }
  .choice {
    display: grid; grid-template-columns: 26px 1fr; gap: 10px;
    padding: 10px 8px;
    border: 2px solid transparent;
    cursor: pointer;
    background: transparent;
    text-align: left;
    font-family: inherit;
    color: var(--ink);
  }
  .choice.armed { background: rgba(160, 138, 95, .3); border-color: var(--ornament); }
  .choice.disabled { opacity: .4; cursor: default; }
  .choice .mark {
    width: 15px; height: 15px; background: var(--ornament);
    transform: rotate(45deg); margin: 5px 0 0 4px;
  }
  .choice .title { font-size: 17px; line-height: 1.45; }
  .choice .prob { font-size: 14px; color: var(--ink-soft); margin-top: 5px; display: flex; align-items: center; flex-wrap: wrap; gap: 4px 8px; }
  .choice .prob .stat { font-weight: bold; }
  .boost {
    font-family: inherit; font-size: 12px;
    padding: 3px 10px;
    border: 1px solid var(--ember); color: var(--ember);
    background: transparent; cursor: pointer;
  }
  .boost.on { background: var(--ember); color: #fff; }
  .boost:disabled { border-color: var(--panel-dark); color: var(--panel-dark); cursor: default; }

  /* ---------- 하단 바 ---------- */
  footer { margin-top: auto; display: flex; gap: 10px; padding-top: 18px; }
  .big-icon {
    width: 56px; height: 56px;
    background: var(--panel-dark);
    border: 2px solid var(--frame);
    font-size: 13px; color: var(--ink);
    cursor: pointer;
    font-family: inherit;
  }
  .big-icon:last-child { margin-left: auto; }

  #toast {
    position: fixed; left: 50%; bottom: 96px; transform: translateX(-50%);
    background: rgba(0,0,0,.7); color: #fff;
    padding: 9px 20px; font-size: 14px;
    opacity: 0; pointer-events: none;
    transition: opacity .25s;
    white-space: nowrap;
  }
  #toast.show { opacity: 1; }

  button:focus-visible { outline: 3px solid var(--blue); }
  @media (prefers-reduced-motion: reduce) {
    #progress-fill { transition: none; }
  }
</style>

<div id="game">
  <header>
    <div id="portrait">이</div>
    <div class="head-right">
      <div class="head-top">
        <div id="nameplate">이름 없는 길잡이</div>
        <button class="icon-btn" data-toast="모험 기록 — 준비 중">기록</button>
        <button class="icon-btn" id="btn-reset">처음</button>
      </div>
      <div class="stat-grid">
        <div class="stat-cell"><span style="color:var(--red)">근력</span><b id="v-str">5</b></div>
        <div class="stat-cell"><span style="color:var(--blue)">마력</span><b id="v-mag">5</b></div>
        <div class="stat-cell"><span style="color:var(--purple)">지능</span><b id="v-int">5</b></div>
        <div class="stat-cell"><span style="color:var(--green)">민첩</span><b id="v-agi">5</b></div>
        <div class="stat-cell"><span style="color:var(--gold)">운</span><b id="v-luck">5</b></div>
        <div class="stat-cell"><span style="color:var(--ember)">재능</span><b id="v-tal">5</b></div>
        <div class="stat-cell"><span style="color:var(--gold)">금화</span><b id="v-gold">6</b></div>
      </div>
    </div>
  </header>
  <div class="bar-row"><span class="bar-label" style="color:var(--red)">생명</span><div class="rbar"><div class="rbar-fill" id="hp-fill" style="background:var(--red)"></div></div><b class="bar-num" id="hp-num">12/12</b></div>
  <div class="bar-row"><span class="bar-label" style="color:var(--blue)">마력</span><div class="rbar"><div class="rbar-fill" id="mp-fill" style="background:var(--blue)"></div></div><b class="bar-num" id="mp-num">6/6</b></div>

  <div id="progress-wrap">
    <div id="progress"><div id="progress-fill"></div></div>
    <div id="progress-cap"></div>
  </div>

  <div id="illust"><img id="illust-img" alt=""></div>

  <div class="ornament-rule"><div class="diamond"></div></div>
  <div id="roll"></div>
  <div id="story"></div>
  <div class="dist-rule"><span id="v-dist">50</span></div>
  <div id="choices"></div>

  <footer>
    <button class="big-icon" data-toast="기록서 — 준비 중">기록서</button>
    <button class="big-icon" data-toast="상흔(각성) — 준비 중">상흔</button>
    <button class="big-icon" data-toast="업적 — 준비 중">업적</button>
    <button class="big-icon" data-toast="가방 — 준비 중">가방</button>
  </footer>
</div>
<div id="toast"></div>

<script src="story.js"></script>
<script>
'use strict';
/* ===== 스토리 로더 — 데이터는 story.js (editor.html에서 편집) ===== */
let NODES = {};
let draftMode = false;
(function initStory() {
  if (new URLSearchParams(location.search).get('draft') === '1') {
    try {
      const d = localStorage.getItem('mist_story_draft3');
      if (d) { setNodes(JSON.parse(d)); draftMode = true; }
    } catch (e) {}
  }
  if (!draftMode) setNodes(window.STORY_DATA);
  function setNodes(data) { NODES = {}; data.nodes.forEach(n => { NODES[n.id] = n; }); }
})();

const STAT_NAME = { str: '근력', mag: '마력', int: '지능', agi: '민첩', luck: '운', tal: '재능' };
const STAT_COLOR = { str: 'var(--red)', mag: 'var(--blue)', int: 'var(--purple)', agi: 'var(--green)', luck: 'var(--gold)', tal: 'var(--ember)' };

/* ================= 게임 상태 ================= */
let P, nodeId, rollText = '', armedIdx = -1, typeTimer = null;

function newGame() {
  P = { str: 5, mag: 5, int: 5, agi: 5, luck: 5, tal: 5, gold: 6, hp: 12, maxHp: 12, mp: 6, maxMp: 6, dist: 50, reason: '', flags: [] };
  nodeId = 'cc_parent'; // 인생 선택(부모→청소년기→성인기→집을 나온 이유)부터 시작
  rollText = '';
}

function chance(stat) {
  return Math.min(95, Math.max(5, 30 + P[stat] * 2.2));
}

function applyDelta(d) {
  if (!d) return;
  if (d.maxhp) { P.maxHp += d.maxhp; P.hp += d.maxhp; } // 최대치 증가는 현재치도 함께
  if (d.maxmp) { P.maxMp += d.maxmp; P.mp += d.maxmp; }
  if (d.hp) P.hp = Math.min(P.maxHp, P.hp + d.hp);
  if (d.mp) P.mp = Math.max(0, Math.min(P.maxMp, P.mp + d.mp));
  if (d.gold) P.gold = Math.max(0, P.gold + d.gold);
  for (const k of ['str', 'mag', 'int', 'agi', 'luck', 'tal']) if (d[k]) P[k] += d[k];
  if (d.dist) P.dist = Math.max(0, P.dist + d.dist);
  if (d.distset !== undefined && d.distset >= 0) P.dist = d.distset;
}

function pick(c) {
  if (c.cost && P.gold < c.cost) return;
  if (c.mcost && P.mp < c.mcost) return;
  if (c.mcost) P.mp -= c.mcost;
  if (c.setreason) P.reason = c.setreason; // 집을 나온 이유 = 운명 태그
  if (c.setflag) c.setflag.split(',').forEach(f => { f = f.trim(); if (f && !P.flags.includes(f)) P.flags.push(f); }); // 선택 기억
  let next;
  if (!c.check) {
    rollText = '';
    applyDelta(c.sd);
    next = c.s;
  } else {
    const p = chance(c.check);
    const ok = Math.random() * 100 < p;
    rollText = (ok ? '판정 성공' : '판정 실패') + `  (${STAT_NAME[c.check]} ${p.toFixed(1)}%)`;
    applyDelta(ok ? c.sd : c.fd);
    next = ok ? c.s : c.f;
  }
  if (P.hp <= 0) { next = 'forgotten'; rollText = '당신은 쓰러졌다…'; }
  if (next === 'cc_parent') { newGame(); } // 재시작 = 새 인생 선택부터
  else nodeId = next;
  saveGame();
  render();
}

/* ================= 렌더 ================= */
const $ = id => document.getElementById(id);

function render() {
  const node = NODES[nodeId];
  for (const k of ['str', 'mag', 'int', 'agi', 'luck', 'tal']) $('v-' + k).textContent = P[k];
  $('v-gold').textContent = P.gold;
  $('v-dist').textContent = P.dist;
  $('hp-fill').style.width = (100 * P.hp / P.maxHp) + '%';
  $('hp-num').textContent = P.hp + '/' + P.maxHp;
  $('mp-fill').style.width = (100 * P.mp / P.maxMp) + '%';
  $('mp-num').textContent = P.mp + '/' + P.maxMp;
  $('progress-fill').style.width = ((1 - P.dist / 50) * 100) + '%';

  // 노드 삽화 (img/ 폴더에 파일이 있을 때만 표시)
  const ill = $('illust'), illImg = $('illust-img');
  if (node.img) {
    const src = 'img/' + node.img;
    if (illImg.getAttribute('src') === src && illImg.complete && illImg.naturalWidth > 0) {
      ill.style.display = 'block';
    } else {
      ill.style.display = 'none';
      illImg.onload = () => { ill.style.display = 'block'; };
      illImg.onerror = () => { ill.style.display = 'none'; };
      illImg.setAttribute('src', src);
    }
  } else {
    ill.style.display = 'none';
  }

  const roll = $('roll');
  roll.textContent = rollText;
  roll.className = rollText.includes('성공') ? 'ok' : 'bad';

  // 선택지 (본문 타자 완료 후 표시)
  armedIdx = -1;
  const box = $('choices');
  box.innerHTML = '';
  box.classList.add('hidden');
  const visible = node.choices.filter(c =>
    (!c.reqreason || c.reqreason === P.reason) && (!c.reqflag || P.flags.includes(c.reqflag)));
  visible.forEach((c, i) => {
    const btn = document.createElement('div');
    btn.className = 'choice';
    btn.tabIndex = 0;
    const afford = (!c.cost || P.gold >= c.cost) && (!c.mcost || P.mp >= c.mcost);
    if (!afford) btn.classList.add('disabled');
    const destiny = c.reqreason ? '<span style="color:var(--gold);font-weight:bold">[운명] </span>' : '';
    let inner = `<div class="mark"></div><div><div class="title">${destiny}${c.t}</div>`;
    if (c.check) {
      inner += `<div class="prob"><span class="stat" style="color:${STAT_COLOR[c.check]}">${STAT_NAME[c.check]}</span><span class="prob-val">성공확률 : ${chance(c.check).toFixed(1)} %</span></div>`;
    }
    inner += '</div>';
    btn.innerHTML = inner;

    const activate = () => {
      if (!afford) return;
      if (armedIdx === i) { pick(c); return; } // 두 번째 탭: 진행
      armedIdx = i;                            // 첫 탭: 강조
      [...box.children].forEach((el, j) => el.classList.toggle('armed', j === i));
    };
    btn.addEventListener('click', activate);
    btn.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); activate(); } });
    box.appendChild(btn);
  });

  typewrite(node.text);
}

/* 타자기 효과 — 본문 탭하면 즉시 완성 */
function typewrite(full) {
  const el = $('story');
  clearInterval(typeTimer);
  el.textContent = '';
  let i = 0;
  typeTimer = setInterval(() => {
    i++;
    el.textContent = full.slice(0, i);
    if (i >= full.length) finishType(full);
  }, 25);
  el.onclick = () => finishType(full);
}

function finishType(full) {
  clearInterval(typeTimer);
  typeTimer = null;
  $('story').textContent = full;
  $('choices').classList.remove('hidden');
}

/* 토스트 */
let toastTimer = null;
document.querySelectorAll('[data-toast]').forEach(b => {
  b.addEventListener('click', () => {
    const t = $('toast');
    t.textContent = b.dataset.toast;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 1400);
  });
});

/* 자동저장 / 이어하기 */
function saveGame() {
  try { localStorage.setItem('mist_save3', JSON.stringify({ P, nodeId })); } catch (e) {}
}
function loadGame() {
  try {
    const s = JSON.parse(localStorage.getItem('mist_save3'));
    if (s && s.P && Array.isArray(s.P.flags) && NODES[s.nodeId]) { P = s.P; nodeId = s.nodeId; return true; }
  } catch (e) {}
  return false;
}

/* 처음부터 — 실수 방지용 2탭 */
let resetArmed = 0;
document.getElementById('btn-reset').addEventListener('click', () => {
  const t = $('toast');
  if (Date.now() - resetArmed < 3000) {
    resetArmed = 0;
    localStorage.removeItem('mist_save3');
    newGame();
    render();
    t.textContent = '처음부터 시작합니다';
  } else {
    resetArmed = Date.now();
    t.textContent = '한 번 더 누르면 처음부터 시작합니다';
  }
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 1600);
});

newGame();
if (draftMode) {
  const b = document.createElement('div');
  b.textContent = '편집 초안 미리보기 중';
  b.style.cssText = 'position:fixed;top:0;left:50%;transform:translateX(-50%);background:var(--ember);color:#fff;font-size:12px;padding:3px 14px;z-index:9;';
  document.body.appendChild(b);
} else {
  loadGame();
}
render();
</script>
