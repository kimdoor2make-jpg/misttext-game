<meta charset="utf-8">
<title>잊힘의 안개 — 텍스트 원정</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<style>
  :root {
    --bg: #D9D0BE;
    --panel: #E6DECC;
    --panel-dark: #C9BFA8;
    --ink: #3A3128;
    --ink-soft: #6B5F4E;
    --ornament: #A08A5F;
    --frame: #57493A;
    --red: #B03A48;
    --blue: #4E7FA8;
    --purple: #8A5FA0;
    --gold: #C08A2E;
    --green: #5F8F4E;
    --ember: #7E6BAF;
    --bar-fill: #7FA36B;
    --surround: #2A2620;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: var(--surround);
    font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
    color: var(--ink);
    display: flex;
    justify-content: center;
  }
  #game {
    width: 100%;
    max-width: 540px;
    min-height: 100dvh;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    padding: 16px 16px 12px;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  /* ---------- 헤더 ---------- */
  header { display: grid; grid-template-columns: 118px 1fr; gap: 10px; }
  #portrait {
    width: 118px; height: 118px;
    background: #6B7D94;
    border: 4px solid var(--frame);
    display: flex; align-items: center; justify-content: center;
    color: #EBE7DC; font-size: 52px; font-weight: bold;
  }
  .head-right { display: flex; flex-direction: column; gap: 7px; min-width: 0; }
  .head-top { display: flex; gap: 7px; align-items: stretch; }
  #nameplate {
    flex: 1;
    background: var(--panel);
    border: 2px solid var(--frame);
    text-align: center;
    font-size: 17px; font-weight: bold;
    padding: 7px 4px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .icon-btn {
    width: 38px;
    background: var(--panel);
    border: 2px solid var(--frame);
    font-size: 11px; color: var(--ink);
    cursor: pointer;
    font-family: inherit;
  }
  .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
  .stat-cell {
    background: var(--panel);
    border: 1px solid var(--panel-dark);
    display: flex; justify-content: space-between; align-items: center;
    padding: 4px 8px;
    font-size: 14px;
  }
  .stat-cell b { font-variant-numeric: tabular-nums; font-size: 16px; }
  .pips { display: flex; gap: 6px; margin-top: 8px; }
  .pip { width: 15px; height: 15px; border-radius: 50%; }

  /* ---------- 진행 바 ---------- */
  #progress-wrap { display: flex; align-items: center; gap: 6px; margin-top: 12px; }
  #progress {
    flex: 1; height: 16px;
    background: var(--panel-dark);
    border: 2px solid var(--frame);
  }
  #progress-fill { height: 100%; width: 0%; background: var(--bar-fill); transition: width .6s ease; }
  #progress-cap { width: 22px; height: 22px; background: var(--ornament); }

  /* ---------- 본문 ---------- */
  .ornament-rule {
    display: flex; align-items: center; gap: 14px;
    margin: 16px 8px 0;
  }
  .ornament-rule::before, .ornament-rule::after {
    content: ''; flex: 1; height: 2px; background: var(--ornament);
  }
  .diamond { width: 14px; height: 14px; background: var(--ornament); transform: rotate(45deg); }

  #roll {
    text-align: center; font-size: 14px; font-weight: bold;
    min-height: 22px; margin-top: 8px;
  }
  #roll.ok { color: var(--green); }
  #roll.bad { color: var(--red); }

  #story {
    font-family: 'Nanum Myeongjo', 'Batang', 'AppleMyungjo', serif;
    font-size: 17px; line-height: 1.75;
    padding: 6px 10px 0;
    min-height: 200px;
    white-space: pre-wrap;
    cursor: pointer;
  }

  .dist-rule {
    display: flex; align-items: center; gap: 16px;
    margin: 14px 16px 6px;
    color: var(--ink-soft); font-size: 15px;
    font-variant-numeric: tabular-nums;
  }
  .dist-rule::before, .dist-rule::after {
    content: ''; flex: 1; height: 1px; background: var(--ink-soft);
  }

  /* ---------- 선택지 ---------- */
  #choices { display: flex; flex-direction: column; gap: 10px; padding: 6px 4px; }
  #choices.hidden { visibility: hidden; }
  .choice {
    display: grid; grid-template-columns: 26px 1fr; gap: 10px;
    padding: 10px 8px;
    border: 2px solid transparent;
    cursor: pointer;
    background: transparent;
    text-align: left;
    font-family: inherit;
    color: var(--ink);
  }
  .choice.armed { background: rgba(160, 138, 95, .3); border-color: var(--ornament); }
  .choice.disabled { opacity: .4; cursor: default; }
  .choice .mark {
    width: 15px; height: 15px; background: var(--ornament);
    transform: rotate(45deg); margin: 5px 0 0 4px;
  }
  .choice .title { font-size: 17px; line-height: 1.45; }
  .choice .prob { font-size: 14px; color: var(--ink-soft); margin-top: 5px; display: flex; align-items: center; flex-wrap: wrap; gap: 4px 8px; }
  .choice .prob .stat { font-weight: bold; }
  .boost {
    font-family: inherit; font-size: 12px;
    padding: 3px 10px;
    border: 1px solid var(--ember); color: var(--ember);
    background: transparent; cursor: pointer;
  }
  .boost.on { background: var(--ember); color: #fff; }
  .boost:disabled { border-color: var(--panel-dark); color: var(--panel-dark); cursor: default; }

  /* ---------- 하단 바 ---------- */
  footer { margin-top: auto; display: flex; gap: 10px; padding-top: 18px; }
  .big-icon {
    width: 56px; height: 56px;
    background: var(--panel-dark);
    border: 2px solid var(--frame);
    font-size: 13px; color: var(--ink);
    cursor: pointer;
    font-family: inherit;
  }
  .big-icon:last-child { margin-left: auto; }

  #toast {
    position: fixed; left: 50%; bottom: 96px; transform: translateX(-50%);
    background: rgba(0,0,0,.7); color: #fff;
    padding: 9px 20px; font-size: 14px;
    opacity: 0; pointer-events: none;
    transition: opacity .25s;
    white-space: nowrap;
  }
  #toast.show { opacity: 1; }

  button:focus-visible { outline: 3px solid var(--blue); }
  @media (prefers-reduced-motion: reduce) {
    #progress-fill { transition: none; }
  }
</style>

<div id="game">
  <header>
    <div id="portrait">이</div>
    <div class="head-right">
      <div class="head-top">
        <div id="nameplate">이름 없는 길잡이</div>
        <button class="icon-btn" data-toast="모험 기록 — 준비 중">기록</button>
        <button class="icon-btn" data-toast="설정 — 준비 중">설정</button>
      </div>
      <div class="stat-grid">
        <div class="stat-cell"><span style="color:var(--red)">담력</span><b id="v-grit">8</b></div>
        <div class="stat-cell"><span style="color:var(--blue)">민첩</span><b id="v-agi">8</b></div>
        <div class="stat-cell"><span style="color:var(--purple)">기억</span><b id="v-mem">8</b></div>
        <div class="stat-cell"><span style="color:var(--gold)">금화</span><b id="v-gold">13</b></div>
        <div class="stat-cell"><span style="color:var(--green)">생명</span><b id="v-hp">13</b></div>
        <div class="stat-cell"><span style="color:var(--ember)">불씨</span><b id="v-ember">10</b></div>
      </div>
    </div>
  </header>
  <div class="pips" id="hp-pips"></div>
  <div class="pips" id="ember-pips"></div>

  <div id="progress-wrap">
    <div id="progress"><div id="progress-fill"></div></div>
    <div id="progress-cap"></div>
  </div>

  <div class="ornament-rule"><div class="diamond"></div></div>
  <div id="roll"></div>
  <div id="story"></div>
  <div class="dist-rule"><span id="v-dist">50</span></div>
  <div id="choices"></div>

  <footer>
    <button class="big-icon" data-toast="기록서 — 준비 중">기록서</button>
    <button class="big-icon" data-toast="상흔(각성) — 준비 중">상흔</button>
    <button class="big-icon" data-toast="업적 — 준비 중">업적</button>
    <button class="big-icon" data-toast="가방 — 준비 중">가방</button>
  </footer>
</div>
<div id="toast"></div>

<script>
'use strict';
/* ================= 스토리 데이터 — 1장 「안개나루를 떠나며」 ================= */
/* check: grit(담력)·agi(민첩)·mem(기억) | sd/fd: 성공/실패 시 변화 | cost: 필요한 금화 */
const NODES = {
  intro: {
    text: '무월의 밤, 왕관이 떨어진 뒤로 잊힌 것들은 안개가 되었다.\n 안개나루의 푸른 등불만이 아직 당신의 이름을 지켜 주고 있다.\n 나루지기가 낡은 지도를 내민다.\n "해류 봉화의 불이 꺼졌네. 이름을 되부르는 불이 꺼지면, 이 나루도 오래 버티지 못해."',
    choices: [
      { t: '지도를 받아 들고 길을 나선다', s: 'fork', sd: { dist: -2 } },
      { t: '떠나기 전 등불 아래에서 내 이름을 세 번 되뇐다', s: 'name_rite', sd: { ember: 1 } }
    ]
  },
  name_rite: {
    text: '당신은 푸른 등불 아래 무릎을 꿇고 제 이름을 되뇌었다.\n 세 번째 부름에 등불이 화답하듯 일렁이며, 불티 하나가 당신의 옷깃에 내려앉았다.\n 잊히지 않겠다는 다짐은, 이 세계에서 가장 오래가는 무기다.',
    choices: [{ t: '길을 나선다', s: 'fork', sd: { dist: -2 } }]
  },
  fork: {
    text: '나루를 벗어나자 안개가 무릎까지 차올랐다.\n 길은 둘로 갈라진다. 왼쪽은 소금꽃이 하얗게 핀 소금늪 — 소금은 기억을 절인다고 했다.\n 오른쪽은 재를 쓴 소나무들이 늘어선 잿빛 숲. 불탔던 날을 나무들만 기억하는 곳이다.',
    choices: [
      { t: '소금늪 길로 간다', s: 'marsh', sd: { dist: -6 } },
      { t: '잿빛 숲 길로 간다', s: 'ambush', sd: { dist: -6 } }
    ]
  },
  marsh: {
    text: '소금꽃 아래, 늪이 삼킨 이름들이 느리게 뒤척인다.\n 수면 위로 반쯤 잠긴 돌 제단이 보였다. 오래된 별빛이 제단 위에 고여 있다.\n 별은 잊는 법을 모른다 — 스승들이 그렇게 가르쳤다.',
    choices: [
      { t: '제단의 별빛에 손을 얹고 옛 노래를 떠올린다', check: 'mem', s: 'marsh_success', f: 'marsh_fail', sd: { ember: 2, mem: 1 }, fd: { hp: -2 } },
      { t: '위험하다. 제단을 지나쳐 간다', s: 'bell', sd: { dist: -4 } }
    ]
  },
  marsh_success: {
    text: '노래의 첫 소절을 떠올리자 별빛이 당신의 손끝을 타고 올라왔다.\n 낡은 기억이 따뜻하게 데워지고, 불티 두 점이 옷깃에 스몄다.\n 늪 저편에서 누군가 — 혹은 무언가가 — 당신의 노래를 따라 흥얼거렸다.',
    choices: [{ t: '계속 나아간다', s: 'bell', sd: { dist: -4 } }]
  },
  marsh_fail: {
    text: '노래는 두 번째 소절에서 끊겼다. 당신이 잊은 자리로 안개가 파고들었다.\n 차가운 소금물이 정강이를 훑고 지나가며, 무언가를 가져갔다.\n 무엇을 잃었는지조차 기억나지 않는 것이 가장 아팠다.',
    choices: [{ t: '몸을 추스르고 나아간다', s: 'bell', sd: { dist: -4 } }]
  },
  ambush: {
    text: '아주 작은 소리였지만, 당신은 풀숲에서 뭔가 움직이는 것 같은 소리를 들었다. 그리고 그 직후 쉭---!\n 파공성과 함께 당신에게 뭔가 날아왔다.',
    choices: [
      { t: '옆으로 피한다', check: 'agi', s: 'ambush_dodge', f: 'ambush_hit', sd: { agi: 1 }, fd: { hp: -3 } },
      { t: '튕겨낸다', check: 'grit', s: 'ambush_parry', f: 'ambush_hit', sd: { grit: 1 }, fd: { hp: -3 } }
    ]
  },
  ambush_dodge: {
    text: '몸이 먼저 움직였다. 화살 아닌 뼈붙이 하나가 귓가를 스치고 소나무에 박혔다.\n 풀숲에서 안개쥐 한 마리가 튀어나와 이빨을 드러냈다 — 안개에 길든 추적자. 약한 틈을 놓치지 않는 놈들이다.\n 하지만 당신의 발놀림이 더 빨랐다. 놈은 곧 안개 속으로 흩어졌다.',
    choices: [{ t: '놈이 떨어뜨린 것을 줍는다', s: 'bell', sd: { gold: 4, dist: -4 } }]
  },
  ambush_parry: {
    text: '당신은 물러서는 대신 팔을 들어 쳐냈다. 뼈붙이가 쨍 소리를 내며 튕겨 나갔다.\n 풀숲의 안개쥐가 멈칫했다. 놈들은 겁내지 않는 자를 공격하는 법을 잊었다.\n 당신이 한 걸음 내딛자, 놈은 꼬리를 말고 안개 속으로 사라졌다.',
    choices: [{ t: '가슴을 펴고 나아간다', s: 'bell', sd: { dist: -4 } }]
  },
  ambush_hit: {
    text: '반응이 늦었다. 뼈붙이가 어깨를 스치며 살을 찢었다.\n 상처에서 피 대신 옅은 안개가 새어 나오는 것을 보고 당신은 이를 악물었다.\n 잊힘은 언제나 상처에서 먼저 시작된다.',
    choices: [{ t: '상처를 동여매고 나아간다', s: 'bell', sd: { dist: -4 } }]
  },
  bell: {
    text: '길이 다시 하나로 모이는 곳, 물에 잠긴 종루가 서 있었다.\n 물에 잠긴 종이 울릴 때마다 잃어버린 기억이 떠오른다고 했다.\n 종루 아래 그늘에서 등짐을 진 상인이 손을 흔든다. "산 사람은 오랜만이군! 구경하고 가게."',
    choices: [
      { t: '종에 잠수해 종을 울린다', check: 'grit', s: 'bell_ring', f: 'bell_fail', sd: { ember: 2, gold: 6 }, fd: { hp: -3 } },
      { t: '상인에게서 소금절임 약초를 산다 (금화 5)', s: 'merchant_buy', sd: { gold: -5, hp: 5 }, cost: 5 },
      { t: '종루를 지나 봉화 절벽으로 향한다', s: 'beacon_gate', sd: { dist: -8 } }
    ]
  },
  bell_ring: {
    text: '차가운 물속에서 당신은 온 힘으로 종을 밀었다.\n 우우웅 — 물을 타고 번진 종소리에 안개가 크게 출렁였다.\n 종루 바닥에 가라앉아 있던 여행자의 유품이 떠올랐다. 그리고 잠깐, 아주 잠깐, 당신은 고향의 아침 냄새를 기억해 냈다.',
    choices: [{ t: '유품을 챙기고 봉화 절벽으로 향한다', s: 'beacon_gate', sd: { dist: -8 } }]
  },
  bell_fail: {
    text: '종은 꿈쩍도 하지 않았다. 대신 종소리를 기다리던 것이 물 밑에서 눈을 떴다.\n 잠긴 종루에 남은 기억이 갑옷처럼 굳은 것 — 종루 수호자였다.\n 당신은 굳은 손아귀에서 간신히 발목을 빼내고 물가로 기어올랐다.',
    choices: [{ t: '젖은 몸으로 봉화 절벽으로 향한다', s: 'beacon_gate', sd: { dist: -8 } }]
  },
  merchant_buy: {
    text: '상인은 금화를 받아 이로 깨물어 보고는 씩 웃었다.\n "소금에 절인 약초야. 소금은 기억을 절이지 — 상처도 좀 덜 잊게 해 주고."\n 쓰디쓴 약초를 씹자 어깨의 통증이 가라앉았다.',
    choices: [{ t: '봉화 절벽으로 향한다', s: 'beacon_gate', sd: { dist: -8 } }]
  },
  beacon_gate: {
    text: '절벽 끝, 꺼진 해류 봉화가 보인다. 푸른 불씨의 이름을 이제는 돌껍질 수호자만이 기억한다.\n 봉화 앞을 막아선 수호자가 천천히 고개를 들었다. 봉화가 처음 세워졌을 때부터 잠들지 않은 문지기다.\n "불을 원하는 자여. 이 불의 이름을 말하라."',
    choices: [
      { t: '나루지기의 지도 여백에 적힌 옛 글자를 떠올린다', check: 'mem', s: 'beacon_lit', f: 'guardian_fight', sd: { mem: 1, distset: 0 }, fd: {} },
      { t: '힘으로 밀고 지나간다', check: 'grit', s: 'guardian_beaten', f: 'guardian_lose', sd: { grit: 1 }, fd: { hp: -4 } }
    ]
  },
  guardian_fight: {
    text: '이름이 혀끝에서 맴돌다 흩어졌다. 수호자의 돌껍질이 굉음을 내며 일어섰다.\n "잊은 자는 지나지 못한다."\n 돌주먹이 절벽을 내리찍었다. 피할 곳은 많지 않다.',
    choices: [
      { t: '절벽 가장자리로 굴러 피한다', check: 'agi', s: 'guardian_beaten', f: 'guardian_lose', sd: { agi: 1 }, fd: { hp: -4 } }
    ]
  },
  guardian_beaten: {
    text: '싸움 끝에 수호자가 한쪽 무릎을 꿇었다. 돌껍질 틈에서 낮은 목소리가 새어 나왔다.\n "...오랜만이군, 물러서지 않는 자는. 불의 이름은 \'첫 항해\'다. 네가 대신 기억해 다오."\n 수호자는 그렇게 말하고 다시 돌이 되었다.',
    choices: [
      { t: '봉화에 불씨를 바친다 (불씨 3)', s: 'beacon_lit', sd: { distset: 0 }, ecost: 3 },
      { t: '제 피로 불을 먹인다 (생명 4)', s: 'beacon_lit', sd: { hp: -4, distset: 0 } }
    ]

const STAT_NAME = { grit: '담력', agi: '민첩', mem: '기억' };
const STAT_COLOR = { grit: 'var(--red)', agi: 'var(--blue)', mem: 'var(--purple)' };

/* ================= 게임 상태 ================= */
let P, nodeId, rollText = '', armedIdx = -1, typeTimer = null;

function newGame() {
  P = { grit: 8, agi: 8, mem: 8, gold: 13, hp: 13, maxHp: 13, ember: 10, dist: 50 };
  nodeId = 'intro';
  rollText = '';
}

const BOOST_COST = 2;   // 불씨 보정에 드는 불씨
const BOOST_BONUS = 15; // 성공확률 가산

function chance(stat, boosted) {
  return Math.min(95, Math.max(5, 30 + P[stat] * 2.2 + (boosted ? BOOST_BONUS : 0)));
}

function applyDelta(d) {
  if (!d) return;
  if (d.hp) P.hp = Math.min(P.maxHp, P.hp + d.hp);
  if (d.gold) P.gold = Math.max(0, P.gold + d.gold);
  if (d.ember) P.ember = Math.max(0, P.ember + d.ember);
  if (d.grit) P.grit += d.grit;
  if (d.agi) P.agi += d.agi;
  if (d.mem) P.mem += d.mem;
  if (d.dist) P.dist = Math.max(0, P.dist + d.dist);
  if (d.distset !== undefined) P.dist = d.distset;
}

function pick(c, boosted) {
  if (c.cost && P.gold < c.cost) return;
  if (c.ecost && P.ember < c.ecost) return;
  if (c.ecost) P.ember -= c.ecost;
  let next;
  if (!c.check) {
    rollText = '';
    applyDelta(c.sd);
    next = c.s;
  } else {
    if (boosted && P.ember >= BOOST_COST) P.ember -= BOOST_COST;
    else boosted = false;
    const p = chance(c.check, boosted);
    const ok = Math.random() * 100 < p;
    const tag = boosted ? ' · 불씨 보정' : '';
    rollText = (ok ? '판정 성공' : '판정 실패') + `  (${STAT_NAME[c.check]} ${p.toFixed(1)}%${tag})`;
    applyDelta(ok ? c.sd : c.fd);
    next = ok ? c.s : c.f;
  }
  if (P.hp <= 0) { next = 'forgotten'; rollText = '당신은 쓰러졌다…'; }
  if (next === 'intro') { newGame(); }
  else nodeId = next;
  render();
}

/* ================= 렌더 ================= */
const $ = id => document.getElementById(id);

function pipRow(el, filled, color) {
  el.innerHTML = '';
  for (let i = 0; i < 5; i++) {
    const d = document.createElement('div');
    d.className = 'pip';
    d.style.background = color;
    d.style.opacity = i < filled ? 1 : .22;
    el.appendChild(d);
  }
}

function render() {
  const node = NODES[nodeId];
  $('v-grit').textContent = P.grit;
  $('v-agi').textContent = P.agi;
  $('v-mem').textContent = P.mem;
  $('v-gold').textContent = P.gold;
  $('v-hp').textContent = P.hp;
  $('v-ember').textContent = P.ember;
  $('v-dist').textContent = P.dist;
  pipRow($('hp-pips'), Math.ceil(5 * P.hp / P.maxHp), 'var(--red)');
  pipRow($('ember-pips'), Math.min(5, Math.ceil(P.ember / 2)), 'var(--ember)');
  $('progress-fill').style.width = ((1 - P.dist / 50) * 100) + '%';

  const roll = $('roll');
  roll.textContent = rollText;
  roll.className = rollText.includes('성공') ? 'ok' : 'bad';

  // 선택지 (본문 타자 완료 후 표시)
  armedIdx = -1;
  const box = $('choices');
  box.innerHTML = '';
  box.classList.add('hidden');
  node.choices.forEach((c, i) => {
    const btn = document.createElement('div');
    btn.className = 'choice';
    btn.tabIndex = 0;
    const afford = (!c.cost || P.gold >= c.cost) && (!c.ecost || P.ember >= c.ecost);
    if (!afford) btn.classList.add('disabled');
    let boosted = false;
    let inner = `<div class="mark"></div><div><div class="title">${c.t}</div>`;
    if (c.check) {
      inner += `<div class="prob"><span class="stat" style="color:${STAT_COLOR[c.check]}">${STAT_NAME[c.check]}</span><span class="prob-val">성공확률 : ${chance(c.check).toFixed(1)} %</span>`;
      if (afford) inner += `<button class="boost" type="button"${P.ember >= BOOST_COST ? '' : ' disabled'}>불씨 ${BOOST_COST} → +${BOOST_BONUS}%</button>`;
      inner += '</div>';
    }
    inner += '</div>';
    btn.innerHTML = inner;

    const boostBtn = btn.querySelector('.boost');
    if (boostBtn) {
      boostBtn.addEventListener('click', e => {
        e.stopPropagation(); // 보정 토글이 선택지 탭으로 번지지 않게
        boosted = !boosted;
        boostBtn.classList.toggle('on', boosted);
        btn.querySelector('.prob-val').textContent = `성공확률 : ${chance(c.check, boosted).toFixed(1)} %`;
      });
    }

    const activate = () => {
      if (!afford) return;
      if (armedIdx === i) { pick(c, boosted); return; } // 두 번째 탭: 진행
      armedIdx = i;                                     // 첫 탭: 강조
      [...box.children].forEach((el, j) => el.classList.toggle('armed', j === i));
    };
    btn.addEventListener('click', activate);
    btn.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); activate(); } });
    box.appendChild(btn);
  });

  typewrite(node.text);
}

/* 타자기 효과 — 본문 탭하면 즉시 완성 */
function typewrite(full) {
  const el = $('story');
  clearInterval(typeTimer);
  el.textContent = '';
  let i = 0;
  typeTimer = setInterval(() => {
    i++;
    el.textContent = full.slice(0, i);
    if (i >= full.length) finishType(full);
  }, 25);
  el.onclick = () => finishType(full);
}

function finishType(full) {
  clearInterval(typeTimer);
  typeTimer = null;
  $('story').textContent = full;
  $('choices').classList.remove('hidden');
}

/* 토스트 */
let toastTimer = null;
document.querySelectorAll('[data-toast]').forEach(b => {
  b.addEventListener('click', () => {
    const t = $('toast');
    t.textContent = b.dataset.toast;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 1400);
  });
});

newGame();
render();
</script>
